services:
  minio:
    image: docker.io/bitnami/minio:2026
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - 'minio_data:/bitnami/minio/data'
    environment:
      - MINIO_ROOT_USER=minio
      - MINIO_ROOT_PASSWORD=miniosecret

volumes:
  minio_data:
    driver: local
