services:
  solr:
    image: docker.io/bitnami/solr:10
    environment:
      - SOLR_ENABLE_AUTHENTICATION=yes
      - SOLR_ADMIN_PASSWORD=bitnami
    ports:
      - '8983:8983'
    volumes:
      - 'solr_data:/bitnami/solr'
volumes:
  solr_data:
    driver: local
