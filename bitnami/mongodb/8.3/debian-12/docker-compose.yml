services:
  mongodb:
    image: docker.io/bitnami/mongodb:8.3
    ports:
      - "27017:27017"
    volumes:
      - 'mongodb_data:/bitnami/mongodb'
    environment:
      - ALLOW_EMPTY_PASSWORD=yes

volumes:
  mongodb_data:
    driver: local
